<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一人暮らしの味方 - さがす</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/menu/search + new_dish + edit_dish.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="search">
    <header>
        <h1>一人暮らしの味方</h1>
        <h2>さがす</h2>
    </header>
    <main>
        <form method="POST">
            <section>
                <h3>材料をえらぶ</h3>
                <p>いま持っている材料を以下から選択して，さがすボタンを押してください．</p>
                <div class="categoryCardContainer">
                    {% for cat in cat_list %}
                    <!-- カテゴリカード -->
                    <div class="categoryCard">
                        <h4>{{ cat.cat_name }}</h4>
                        <div class="checkboxContainer">
                            {% for ing in ing_list if ing.cat_id == cat.cat_id %}
                            <label>
                                <input type="checkbox" name="searched_ing_id_list" value="{{ ing.ing_id }}">
                                {{ ing.ing_name }}
                            </label>
                            {% else %}
                            <p>材料なし</p>
                            {% endfor %}
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <button type="submit">さがす</button>
            </section>
        </form>
    </main>
    <footer>
        <a href="{{ url_for('index') }}">ホームに戻る</a>
    </footer>
</body>

</html>
