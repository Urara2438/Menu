<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一人暮らしの味方 - 材料一覧</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="listIng">
    <header>
        <h1>一人暮らしの味方</h1>
        <h2>材料をとととのえる</h2>
    </header>
    <main>
        <section>
            <h3>編集する材料をえらぶ</h3>
            <div class="categoryCardContainer">
                {% for cat in cat_list %}
                <div class="categoryCard">
                    <h4>{{ cat.cat_name }}</h4>
                    <div class="checkboxContainer">
                        {% for ing in ing_list if ing.cat_id == cat.cat_id %}
                        <a href="{{ url_for('edit_ing', ing_id=ing.ing_id) }}">{{ ing.ing_name }}</a>
                        {% else %}
                        <p>材料なし</p>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>
    <footer>
        <a href="{{ url_for('index') }}">ホームに戻る</a>
    </footer>
</body>

</html>
