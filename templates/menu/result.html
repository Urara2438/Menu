<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一人暮らしの味方 - 検索結果</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/menu/result.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="result">
    <header>
        <h1>一人暮らしの味方</h1>
        <h2>さがす</h2>
    </header>

    <main>
        <section>
            <h3>作れる料理一覧</h3>
            <div class="resultCardContainer">
                {% for dish_name, match_score, lack, lack_ing_name_list in result_list %}
                <div class="resultCard">
                    <p class="dishName">{{ dish_name }}</p>
                    {% if lack == 0 %}
                    <span class="nolack">不足なし</span>
                    {% else %}
                    <span class="lack">不足あり</span><br>
                    {{ lack }}個：{{ lack_ing_name_list | join(', ') }}
                    {% endif %}
                    <a href="https://www.google.com/search?q={{ (dish_name ~ ' レシピ')|urlencode }}" target="_blank"
                        rel="noopener">レシピを検索</a>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>

    <footer>
        <a href="{{ url_for('search') }}">さがしなおす</a>
        <a href="{{ url_for('index') }}">ホームに戻る</a>
    </footer>
</body>

</html>
