<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一人暮らしの味方 - 料理の編集</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/menu/search + new_dish + edit_dish.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <header>
        <h1>一人暮らしの味方</h1>
        <h2>料理を編集</h2>
    </header>
    <hr><br>
    <form method="POST">

        <section>
            <div class="inputForm">
                <h3>料理の名前をかえる</h3>
                <label for="set_ing_name">材料の名前</label><br>
                <input type="text" id="set_ing_name" name="new_ing_name" required>
            </div>
        </section>
        <section>
            <!-- 材料選択======================================================================================== -->
            <h3>材料をえらびなおす</h3>
            <div class="categoryCardContainer"><!-- カテゴリカードのコンテナ -->
                {% for cat in cat_list %}
                <!-- カテゴリカード -->
                <div class="categoryCard">
                    <h4>{{ cat.cat_name }}</h4>
                    <div class="checkbox-container">
                        {% for ing in ing_list if ing.cat_id == cat.cat_id %}
                        <label>
                            <input type="checkbox" name="edited_ing_id_needed_list" value="{{ ing.ing_id }}">
                            {{ ing.ing_name }}
                        </label>
                        {% else %}
                        <p>材料なし</p>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}
            </div>
            <button type="submit" onclick="return confirm('編集します．よろしいですか？')">編集</button>
        </section>
    </form>
    <footer>
        <a href="{{ url_for('list_dish') }}">料理をえらびなおす</a>
        <a href="{{ url_for('index') }}">ホームに戻る</a>
    </footer>
</body>

</html>
