<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一人暮らしの味方 - ホーム</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/menu/index.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>一人暮らしの味方</h1>
        <h2>今日の献立</h2><br>
    </header>
    <hr><br>
    <!-- メニュー -->
    <main>
        <div class="selecter_container">
            <a id="card_search" class="search" href="{{ url_for('search') }}">
                <span id="search">さがす</span>
                <p>登録済みの材料からあるものを選択して，いま作れる料理をさがすことができます．</p>
                <img id="dish_img" width="250px">
            </a>
            
            <div class="new_edit_container"><!-- ふやすカードとととのえるカードのコンテナ -->
                <div id="card_new" class="new_edit"><!-- ふやすカード -->
                    <span id="new">ふやす</span>
                    <p>新しい材料や料理を追加できます．</p>
                    <span style="display: flex; justify-content: right;"><img src="/static/img/category/卵・乳製品.png" width="100px"></span>
                </div>
                <!--ホバーされたら表示-->
                <div id="divcard_new">
                    <a href="{{ url_for('new_ing') }}">材料<br><span style="font-size: 1.4rem; font-weight: normal;">をふやす</span></a>
                    <a href="{{ url_for('new_dish') }}">料理<br><span style="font-size: 1.4rem; font-weight: normal;">をふやす</span></a>
                </div>
                <div id="card_edit" class="new_edit"><!-- ととのえるカード -->
                    <span id="edit">ととのえる</span>
                    <p>登録済みの材料や料理を編集できます．</p>
                    <span style="display: flex; justify-content: right;"><img src="/static/img/category/肉類.png" width="100px"></span>
                </div>
                    <!--ホバーされたら表示-->
                <div id="divcard_edit">
                    <a href="{{ url_for('list_ing') }}">材料<br><span style="font-size: 1.4rem; font-weight: normal;">をととのえる</span></a>
                    <a href="{{ url_for('list_dish') }}">料理<br><span style="font-size: 1.4rem; font-weight: normal;">をととのえる</span></a>
                </div>
                </div>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static', filename='javascript/menu/index.js') }}"></script>
</body>
</html>
